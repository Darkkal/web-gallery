name: Release and Package

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node

      # The following steps run ONLY when a new release has been created (i.e. the release PR was merged)
      - name: Checkout code
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v5

      - name: Set up Node.js
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Build standalone binaries
        if: ${{ steps.release.outputs.release_created }}
        run: npm run build:release

      - name: Create release archives
        if: ${{ steps.release.outputs.release_created }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          tar -czf "web-gallery-v${VERSION}-linux-x64.tar.gz" -C dist "web-gallery-v${VERSION}-linux" setup-deps.sh
          tar -czf "web-gallery-v${VERSION}-macos-x64.tar.gz" -C dist "web-gallery-v${VERSION}-macos" setup-deps.sh
          zip -j "web-gallery-v${VERSION}-windows-x64.zip" "dist/web-gallery-v${VERSION}-win.exe" "dist/setup-deps.ps1"

      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload ${{ steps.release.outputs.tag_name }} "web-gallery-v${VERSION}-linux-x64.tar.gz" "web-gallery-v${VERSION}-macos-x64.tar.gz" "web-gallery-v${VERSION}-windows-x64.zip"

      - name: Set up QEMU
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: ${{ steps.release.outputs.release_created }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag_name }}
            type=semver,pattern={{major}},value=${{ steps.release.outputs.tag_name }}
            type=raw,value=${{ steps.release.outputs.tag_name }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
