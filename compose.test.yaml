services:
  webgallery:
    image: webgallery
    userns_mode: keep-id
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: production
      DATA_DIR: /data
      MEDIA_DIR: /media
    ports:
      - 3001:3000
    volumes:
      # Fast storage: database, scraper state
      - ./test-data:/data
      # Bulk storage: downloaded media, avatars
      - ./test-media:/media
      # Firefox cookies for authenticated scraping (Fedora/Nobara path)
      - ~/.config/mozilla/firefox:/home/node/.mozilla/firefox:ro
