services:
  webgallery-debug:
    image: webgallery-dev
    userns_mode: keep-id
    build:
      context: .
      dockerfile: ./Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      DATA_DIR: /data
      TZ: ${TZ:-UTC}
    ports:
      - 3002:3000
      - 9229:9229
    command: >-
      sh -c "mkdir -p /data/scrapers/gallery-dl/archives /data/scrapers/gallery-dl/logs &&
        node --inspect=0.0.0.0:9229 node_modules/.bin/next dev -H 0.0.0.0"
    volumes:
      # Mount source code for hot-reloading (with :z for SELinux on Fedora/Nobara)
      - .:/usr/src/app:z
      # Prevent host node_modules from overwriting container node_modules (anonymous volume)
      - /usr/src/app/node_modules
      # Fix permission errors by keeping the Next.js cache inside the container
      - /usr/src/app/.next
      # Persistent data: database, scraper state
      - ./data:/data
      # Firefox cookies, this is where it's hosted on Fedora
      - ~/.config/mozilla/firefox:/home/node/.mozilla/firefox:ro
      # Align container timezone with host system
      - /etc/localtime:/etc/localtime:ro
